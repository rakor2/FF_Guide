<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Comparison</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: sans-serif;
    }

    .comparison-wrapper {
      max-width: 100%;
      width: 100%;
      position: relative;
    }

    img-comparison-slider {
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      display: block;
    }

    img-comparison-slider img {
      width: 100%;
      display: block;
    }

    .label-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 50px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .label-left {
      left: 16px;
    }

    .label-right {
      right: 16px;
    }

    .caption {
      font-size: 13px;
      color: #777;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="comparison-wrapper">
    <img-comparison-slider>
      <img
      slot="first"
      src="https://i.ibb.co/S7GpGr1B/Screenshot-3888b1a8.jpg"
      alt="AO enabled"
      />
      <img
      slot="second"
      src="https://i.ibb.co/xqVSZbnG/Screenshot-3889b1v9.jpg"
      alt="AO disabled"
      />
    </img-comparison-slider>

    <div class="label-container">
      <div class="label label-left">AO enabled</div>
      <div class="label label-right">AO disabled</div>
    </div>
  </div>

  <script src="compare.js"></script>

</body>
</html>
